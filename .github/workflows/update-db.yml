name: Atualizar banco NBA

on:
  schedule:
    - cron: '0 7 * * *'  # Todo dia às 07:00 UTC (04:00 BRT)
  workflow_dispatch:        # Permite rodar manualmente pelo GitHub

jobs:
  update-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install nba_api pandas

      - name: Atualizar banco de dados
        run: |
          for i in 1 2 3; do
            echo "Tentativa $i..."
            python nba_data.py && break
            echo "Falhou, aguardando 30s..."
            sleep 30
          done

      - name: Commit e push se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nba.db
          git diff --cached --quiet || git commit -m "🔄 Atualização diária do banco NBA - $(date +'%d/%m/%Y')"
          git push
